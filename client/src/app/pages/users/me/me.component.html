<div class="grid-rows-auto grid w-full gap-6 p-8">

    class="flex flex-row gap-4 text-prime-white hover:cursor-pointer hover:text-prime-white/80"
    (click)="goBack()"
  >
    <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
      <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
      <path
        d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8"
      ></path>
      <path d="m12.71 8.71-1.42-1.42L6.59 12l4.7 4.71 1.42-1.42-2.3-2.29H17v-2h-6.59z"></path>
    </svg>
    <span>Go back to POS</span>
  </button>
  <div>
    @if (user(); as currentUser) {
      <app-user-details-form [user]="currentUser" />
    }
  </div>
</div>
