<section class="flex w-full flex-row gap-4 overflow-x-auto border-t border-gray-500 px-4 py-2">
  @for (category of currentStockFilter(); track category) {
    <app-filter-bar-button
      [currentFilter]="currentFilter()"
      [itemCategory]="category"
      (filterChange)="onFilterChange($event)"
    ></app-filter-bar-button>
  }
  @if (currentFilter() !== 'all') {
    <app-filter-bar-button
      [currentFilter]="currentFilter()"
      (filterChange)="onFilterChange($event)"
      itemCategory="all"
    />
  }
</section>
