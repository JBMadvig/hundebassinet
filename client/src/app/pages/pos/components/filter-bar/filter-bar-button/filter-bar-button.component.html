<button
  class="border-text-prime-white hover:bg-text-prime-white hover:text-bg-prime-dark cursor-pointer rounded-l-full rounded-r-full border-2 px-4 py-4 font-semibold text-prime-white transition-all duration-200 ease-in-out"
  (click)="onClick()"
>
  <p class="flex flex-row transition-all duration-500 ease-in-out">
    <span>
      @switch (itemCategory()) {
        @case ('beer') {
          <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <!--Boxicons v3.0.7 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="M20 6h-2V4c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14c0 1.65 1.35 3 3 3h10c1.65 0 3-1.35 3-3v-1h2c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2m-4 12c0 .55-.45 1-1 1H5c-.55 0-1-.45-1-1V5h12zm4-3h-2V8h2z"
            ></path>
            <path d="M6 7h2v9H6zM12 7h2v9h-2z"></path>
          </svg>
        }
        @case ('cider') {

          <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <!--Boxicons v3.0.7 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="M7.79 7.79A6.06 6.06 0 0 0 6 12.12V20c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2v-7.88c0-1.64-.64-3.17-1.79-4.33A4.09 4.09 0 0 1 15 4.88V4h1V2H8v2h1v.88c0 1.1-.43 2.14-1.21 2.91M13 4v.88c0 1.63.64 3.17 1.79 4.33.75.75 1.16 1.74 1.2 2.79H11v6h5v2H8v-7.88c0-1.1.43-2.14 1.21-2.91A6.06 6.06 0 0 0 11 4.88V4z"

          </svg>
        }

          <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <!--Boxicons v3.0.7 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="M11 17.92V20H8v2h8v-2h-3v-2.08c3.18-.4 5.89-2.66 6.76-5.79.26-.95.31-2.03.14-3.21l-.87-6.06c-.07-.49-.49-.86-.99-.86H5.96c-.5 0-.92.37-.99.86L4.1 8.92c-.17 1.18-.12 2.26.14 3.21.87 3.13 3.57 5.39 6.76 5.79m6.83-6.33C17.11 14.19 14.71 16 12 16c-2.56 0-4.83-1.63-5.68-4 .72.32 1.47.49 2.22.49 1.46 0 2.92-.6 4.15-1.77 1.5-1.44 3.35-1.61 4.95-.47l.35.25a5 5 0 0 1-.16 1.08ZM6.83 4h10.34l.58 4.03c-2.15-.98-4.57-.55-6.44 1.25-1.5 1.44-3.35 1.61-4.95.47l-.31-.22.03-.32.75-5.2Z"
            ></path>
          </svg>
        }
        @case ('spirit') {
          <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <!--Boxicons v3.0.7 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="m6.66 9.8.02.02L11 16.3V20H8v2h8v-2h-3v-3.7l7.83-11.75c.2-.31.22-.7.05-1.03a.98.98 0 0 0-.88-.53H4c-.37 0-.71.2-.88.53s-.15.72.05 1.03l3.49 5.24Zm3.22 1.22c1-.06 1.99-.49 2.82-1.3.81-.8 1.75-.96 2.62-.49L12 14.21l-2.12-3.18ZM18.13 5l-1.71 2.56c-1.67-.99-3.63-.74-5.12.72-.91.89-1.97 1-2.93.3l-.22-.16L5.87 5z"
            ></path>
          </svg>
        }
        @case ('other') {
          <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <!--Boxicons v3.0.7 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="m6.66 9.8.02.02L11 16.3V20H8v2h8v-2h-3v-3.7l7.83-11.75c.2-.31.22-.7.05-1.03a.98.98 0 0 0-.88-.53H4c-.37 0-.71.2-.88.53s-.15.72.05 1.03l3.49 5.24Zm3.22 1.22c1-.06 1.99-.49 2.82-1.3.81-.8 1.75-.96 2.62-.49L12 14.21l-2.12-3.18ZM18.13 5l-1.71 2.56c-1.67-.99-3.63-.74-5.12.72-.91.89-1.97 1-2.93.3l-.22-.16L5.87 5z"
            ></path>
          </svg>
        }
        @case ('all') {
          <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <!--Boxicons v3.0.7 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="m6.66 9.8.02.02L11 16.3V20H8v2h8v-2h-3v-3.7l7.83-11.75c.2-.31.22-.7.05-1.03a.98.98 0 0 0-.88-.53H4c-.37 0-.71.2-.88.53s-.15.72.05 1.03l3.49 5.24Zm3.22 1.22c1-.06 1.99-.49 2.82-1.3.81-.8 1.75-.96 2.62-.49L12 14.21l-2.12-3.18ZM18.13 5l-1.71 2.56c-1.67-.99-3.63-.74-5.12.72-.91.89-1.97 1-2.93.3l-.22-.16L5.87 5z"
            ></path>
          </svg>
        }
      }
    </span>
    <span
      class="overflow-hidden whitespace-nowrap transition-all duration-500 ease-in-out"
      [ngClass]="{
        'ml-2 max-w-xs opacity-100': currentFilter() === itemCategory() || itemCategory() === 'all',
        'ml-0 max-w-0 opacity-0': currentFilter() !== itemCategory() && itemCategory() !== 'all',
      }"
      >{{ itemCategory().toLocaleUpperCase() }}</span
    >
  </p>
</button>
