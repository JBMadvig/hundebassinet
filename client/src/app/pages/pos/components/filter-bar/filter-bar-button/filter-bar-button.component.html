<button
  class="rounded-md px-4 py-4 font-semibold text-gray-900 cursor-pointer"
  [ngClass]="[categoryBackground(),
    currentFilter() === itemCategory() ? 'border-2 border-black' : 'border border-transparent'
  ]"
  (click)="onClick()"
>
  <p>{{ itemCategory().toLocaleUpperCase() }}</p>
</button>
