<div class="flex h-dvh flex-col items-center justify-center p-6">
  <section class="flex w-full max-w-md flex-col items-center gap-6">
    <!-- Logo -->
    <div class="w-48">
      <img
        class="h-auto w-full object-contain"
        alt="Hundebassinet Logo"
        src="assets/hundebassinet_logo.webp"
      />
    </div>

    <!-- Title -->
    <div class="text-center">
      <h1 class="text-2xl font-bold text-text-primary">Activate Device</h1>
      <p class="mt-2 text-sm text-text-secondary">Sign in with a sudo-admin account to activate this POS terminal</p>
    </div>

    <!-- Activation form -->
    <form class="flex w-full flex-col gap-4" [formGroup]="activateForm">
      <app-input-field
        autofocus
        formControlName="email"
        label="Email"
        ngDefaultControl
        placeholder="Enter sudo-admin email"
        type="text"
        textOnDark
      />
      <app-input-field
        formControlName="password"
        label="Password"
        ngDefaultControl
        placeholder="Enter password"
        type="password"
        textOnDark
      />
    </form>

    @if (error()) {
      <p class="text-sm text-error">{{ error() }}</p>
    }

    <app-button
      class="w-full"
      (handleClick)="activate()"
      label="Activate Device"
      [loading]="loading()"
    />
  </section>
</div>
