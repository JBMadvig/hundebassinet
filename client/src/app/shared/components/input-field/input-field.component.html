@if (valueFormGroup && valueFormControl) {
  @let controlValue = valueFormControl.value;

  @if (label()) {
    <label class="inline-block text-xs" [for]="controlId">{{ label() }}</label>
    @if (isRequired()) {
      <span class="hover:cursor-default">&#42;</span>
    }
  }
  @if (enabled) {
    <div
      class="box-border flex items-center rounded-full border bg-prime-white p-2 align-middle"
      [ngClass]="{
        'border-l-0': noLeftBorder(),
        'border-error': isInvalid(),
        'border-gray-400': !isInvalid() && theme() === 'light',
        'border-gray-600': !isInvalid() && theme() === 'dark',
      }"
      [formGroup]="valueFormGroup"
    >
      @if (icon()) {
        <i
          class="fa-xs px-2 {{ icon() }}"
          [ngClass]="{
            'text-text-blue': theme() === 'light',
            'text-gray-400': theme() === 'dark',
          }"
        ></i>
      }
      <input
        class="box-border w-full border-gray-400 text-xl font-bold placeholder-gray-400 placeholder:italic focus:outline-hidden"
        [ngClass]="{
          'ml-2': !icon(),
          'pointer-events-none cursor-not-allowed bg-gray-600': disabled(),
          'bg-prime-white': !disabled(),
        }"
        [appAutoFocus]="autofocus()"
        [formControlName]="controlName"
        [max]="max()"
        [min]="min()"
        [placeholder]="placeholder()"
        [type]="
          type() === 'password' && !toggleShowPassword()
            ? 'password'
            : type() === 'password' && toggleShowPassword()
              ? 'text'
              : type()
        "
        [value]="value()"
        (blur)="onBlur()"
        (focus)="onFocus()"
        (input)="onInput()"
      />
      @if (controlValue) {
        <button
          class="ml-2 flex items-center justify-center text-gray-600 transition-colors hover:text-gray-800 focus:outline-none"
          (click)="onClearField()"
          type="button"
        >
          <svg
            fill="currentColor"
            height="24"
            viewBox="0 0 24 24"
            width="24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path
              d="M14.83 7.76 12 10.59 9.17 7.76 7.76 9.17 10.59 12l-2.83 2.83 1.41 1.41L12 13.41l2.83 2.83 1.41-1.41L13.41 12l2.83-2.83z"
            ></path>
            <path
              d="M12 2C9.33 2 6.82 3.04 4.93 4.93S2 9.33 2 12s1.04 5.18 2.93 7.07c1.95 1.95 4.51 2.92 7.07 2.92s5.12-.97 7.07-2.92S22 14.67 22 12s-1.04-5.18-2.93-7.07A9.93 9.93 0 0 0 12 2m5.66 15.66c-3.12 3.12-8.19 3.12-11.31 0-1.51-1.51-2.34-3.52-2.34-5.66s.83-4.15 2.34-5.66S9.87 4 12.01 4s4.15.83 5.66 2.34 2.34 3.52 2.34 5.66-.83 4.15-2.34 5.66Z"
            ></path>
          </svg>
        </button>
      }
      @if (type() === 'password') {
        <button
          class="ml-2 flex items-center justify-center text-gray-600 transition-colors hover:text-gray-800 focus:outline-none"
          (click)="togglePasswordVisibility()"
          type="button"
        >
          @if (toggleShowPassword()) {
            <svg
              fill="currentColor"
              height="24"
              viewBox="0 0 24 24"
              width="24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M12 9a3 3 0 1 0 0 6 3 3 0 1 0 0-6"></path>
              <path
                d="M12 19c7.63 0 9.93-6.62 9.95-6.68.07-.21.07-.43 0-.63-.02-.07-2.32-6.68-9.95-6.68s-9.93 6.61-9.95 6.67c-.07.21-.07.43 0 .63.02.07 2.32 6.68 9.95 6.68Zm0-12c5.35 0 7.42 3.85 7.93 5-.5 1.16-2.58 5-7.93 5s-7.42-3.84-7.93-5c.5-1.16 2.58-5 7.93-5"
              ></path>
            </svg>
          } @else {
            <svg
              fill="currentColor"
              height="24"
              viewBox="0 0 24 24"
              width="24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="m21.95 12.32-1.9-.64C19.98 11.9 18.16 17 12 17s-7.98-5.1-8.05-5.32l-1.9.63s.28.8.93 1.81L.7 15.85l1.21 1.6 2.3-1.74c.58.62 1.29 1.24 2.16 1.77l-1.51 2.48L6.57 21l1.62-2.65c.83.3 1.78.5 2.82.59v3.05h2v-3.05c1.05-.08 1.99-.29 2.82-.59L17.45 21l1.71-1.04-1.51-2.48c.87-.53 1.58-1.15 2.16-1.77l2.3 1.74 1.21-1.6-2.28-1.73c.65-1.01.92-1.79.93-1.81Z"
              ></path>
            </svg>
          }
        </button>
      }
    </div>
  } @else {
    <div
      class="pointer-events-none box-border flex cursor-not-allowed items-center rounded-full border border-gray-400 bg-gray-400 p-2 px-4 align-middle text-gray-500"
      [ngClass]="{ 'border-l-0': noLeftBorder() }"
    >
      @if (icon()) {
        <i class="fa-xs px-2 text-text-blue" [ngClass]="icon()"></i>
      }
      <span
        class="box-border w-full border-gray-400 bg-transparent text-xl font-bold text-gray-500 focus:outline-hidden"
        [ngClass]="{ italic: placeholder }"
      >
        {{ formattedValue }}
      </span>
    </div>
  }
}
