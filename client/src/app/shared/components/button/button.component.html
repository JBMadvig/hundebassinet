@switch (variant()) {
  @case ('solid') {
    <button
      class="grid w-full grid-cols-1 grid-rows-1 rounded-full border leading-4 transition-all"
      [ngClass]="{
        'justify-items-center border-accent-disabled bg-accent-disabled text-text-disabled-accent':
          loading() || isDisabled(),
        'border-border bg-accent text-text-primary hover:bg-accent-hover': !loading() && !isDisabled(),
        'p-3': size() === 'medium',
        'p-2': size() === 'small',
      }"
      [disabled]="loading() || isDisabled()"
      [type]="type()"
      (click)="onClick($event)"
    >
      <span
        class="col-start-1 row-start-1"
        [ngClass]="{
          'opacity-0': loading(),
          'opacity-100': !loading(),
          'text-nowrap': textNoWrap(),
        }"
      >
        @if (icon()) {
          <i class="text-xs">
            <ng-content select="[buttonIcon]"></ng-content>
          </i>
        }

        {{ label() | uppercase }}
      </span>
      @if (loading()) {
        <div class="loader-on-dark-bg col-start-1 row-start-1"></div>
      }
    </button>
  }

  @case ('subtle') {
    <button
      class="w-full rounded-full border border-border leading-4 text-text-primary transition-all"
      [ngClass]="{
        'border-highlight-disabled bg-highlight-disabled': loading() || isDisabled(),
        'bg-highlight hover:bg-highlight-hover': !loading() && !isDisabled(),
        'p-3': size() === 'medium',
        'p-2': size() === 'small',
      }"
      [disabled]="loading() || isDisabled()"
      [type]="type()"
      (click)="onClick($event)"
    >
      @if (loading()) {
        <div class="loader-on-dark-bg"></div>
      } @else {
        @if (icon()) {
          <i class="text-xs">
            <ng-content select="[buttonIcon]"></ng-content>
          </i>
        }

        {{ label() | uppercase }}
      }
    </button>
  }
  @case ('subtle-dark') {
    <button
      class="grid w-full grid-cols-1 grid-rows-1 rounded-full border leading-4 text-text-primary transition-all"
      [ngClass]="{
        'border-border bg-surface opacity-50': loading() || isDisabled(),
        'border-border-strong bg-surface hover:bg-surface-raised': !loading() && !isDisabled(),
        'p-3': size() === 'medium',
        'p-2': size() === 'small',
      }"
      [disabled]="loading() || isDisabled()"
      [type]="type()"
      (click)="onClick($event)"
    >
      <span
        class="col-start-1 row-start-1"
        [ngClass]="{
          'opacity-0': loading(),
          'opacity-100': !loading(),
        }"
      >
        @if (icon()) {
          <i class="text-xs">
            <ng-content select="[buttonIcon]"></ng-content>
          </i>
        }

        {{ label() | uppercase }}
      </span>
      @if (loading()) {
        <div class="loader-on-dark-bg col-start-1 row-start-1"></div>
      }
    </button>
  }

  @case ('danger') {
    <button
      class="w-full rounded-full border leading-4 text-text-on-light transition-all"
      [ngClass]="{
        'border-border bg-error/50 opacity-50': loading() || isDisabled(),
        'border-error bg-error hover:bg-error-hover': !loading() && !isDisabled(),
        'p-3': size() === 'medium',
        'p-2': size() === 'small',
      }"
      [disabled]="loading() || isDisabled()"
      [type]="type()"
      (click)="onClick($event)"
    >
      @if (loading()) {
        <div class="loader-on-light-bg col-start-1 row-start-1"></div>
      } @else {
        {{ label() | uppercase }}
      }
    </button>
  }

  @case ('text') {
    <button
      class="grid grid-flow-col items-center gap-x-1 leading-4 text-accent hover:text-accent-hover"
      [ngClass]="{
        'p-3': size() === 'medium',
        'p-2': size() === 'small',
        'hover:text-accent-hover': textVariant() === 'primary',
        'hover:text-accent-hover/80': textVariant() === 'light',
      }"
      [disabled]="loading() || isDisabled()"
      [type]="type()"
      (click)="onClick($event)"
    >
      @if (icon()) {
        <i class="text-xs">
          <ng-content select="[buttonIcon]"></ng-content>
        </i>
      }

      @if (label()) {
        <span>
          {{ label() }}
        </span>
      }
    </button>
  }
  @case ('menu-text') {
    <button
      class="grid grid-flow-col items-center gap-x-1 leading-4 text-highlight hover:text-highlight-hover"
      [ngClass]="{
        'p-3 text-xl': size() === 'medium',
        'p-2 text-2xl': size() === 'small',
      }"
      [disabled]="loading() || isDisabled()"
      [type]="type()"
      (click)="onClick($event)"
    >
      @if (icon()) {
        <i
          [ngClass]="{
            'text-2xl': size() === 'medium',
            'text-xl': size() === 'small',
          }"
        >
          <ng-content select="[buttonIcon]"></ng-content>
        </i>
      }

      @if (label()) {
        <span
          [ngClass]="{
            'text-2xl': size() === 'medium',
            'text-xl': size() === 'small',
          }"
        >
          {{ label() }}
        </span>
      }
    </button>
  }
}
