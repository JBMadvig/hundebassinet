@if (valueFormGroup && valueFormControl) {
  <div class="grid" [formGroup]="valueFormGroup">
    @if (label()) {
      <div
        class="flex items-center"
        [ngClass]="{
          'py-1': !isRequired(),
        }"
      >
        <label class="text-text-on-light/80" [for]="controlId">
          {{ label() }}
        </label>
        @if (isRequired()) {
          <span class="hover:cursor-default">&#42;</span>
        }
      </div>
    }

    <select
      [id]="controlId"
      class="w-full rounded-full border border-gray-300 bg-white/80 px-4 py-2"
      [ngClass]="{
        'text-text-on-light/60 italic': valueFormControl.value === null,
        'border-error': isInvalid(),
        'border-gray-300': !isInvalid(),
      }"
      [formControlName]="controlName"
    >
      @if (placeholder()) {
        <option [ngValue]="null" disabled hidden selected>{{ placeholder() }}</option>
      }
      @for (optGroup of optGroupsWithId(); track $index) {
        @if (optGroup.label) {
          <optgroup [label]="optGroup.label">
            @for (option of optGroup.options; track option.id) {
              <option [disabled]="option.disabled" [hidden]="option.hidden" [ngValue]="option.value">
                {{ option.text }}
              </option>
            }
          </optgroup>
        } @else {
          @for (option of optGroup.options; track option.id) {
            <option [disabled]="option.disabled" [hidden]="option.hidden" [ngValue]="option.value">
              {{ option.text }}
            </option>
          }
        }
      }

      @if (resetOption()) {
        <option [hidden]="valueFormControl.value === null" ngValue="dropdownreset">Reset</option>
      }
    </select>
  </div>
}
